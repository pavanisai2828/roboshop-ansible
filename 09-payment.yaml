- name: configuration payment server
  hosts: payment
  become: yes
  tasks:
  - name: install python3
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel
  - name: create system user
    ansible.builtin.user:
      name: roboshop
      system: True
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: remove directory
    ansible.builtin.file:
      path: /app
      state: absent
  - name: remove file
    ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent
  - name: create /app directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: Download payment.zip
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest: /tmp/payment.zip
  - name: extract zip file
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
  - name: download dependencies
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app
  - name: set up payment service
    ansible.builtin.template:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service
  - name: deamon reload
    ansible.builtin.systemd_service:
      daemon_reload: True
  - name: enable and start shipping
    ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes