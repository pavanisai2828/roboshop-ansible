- name: configuring shipping instances
  hosts: shipping
  become: yes
  tasks:
  - name: install maven & mysql
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql
  - name: add application user
    ansible.builtin.user:
      name: roboshop
      system: True
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: remove directory
    ansible.builtin.file:
      path: /app
      state: absent
  - name: delete file
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent
  - name: create directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: download zip file
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.zip
  - name: unzip file
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      remote_src: yes
      dest: /app
  - name: download dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app
  - name: move shipping.jar
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
      chdir: /app
  - name: set up shipping.service
    ansible.builtin.copy:
      src: shipping.service.j2
      dest: /etc/systemd/system/shipping.service
  - name: install python dependencies
    pip:
      name: PyMySQL
      executable: pip3.9
    tags:
    - mysql
  - name: load mysql data
    community.mysql.mysql_db:
      state: import
      name: all
      login_host: "{{ MYSQL_HOST }}"
      login_user: uroot
      login_password: pRoboShop@1
      target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql 
    - /app/db/master-data.sql
    tags:
    - mysql
    tags:
    - mysql
  - name: enable and start shipping
    ansible.builtin.service:
      name: shipping
      state: restarted
      enabled: yes
    tags:
    - mysql
  

      